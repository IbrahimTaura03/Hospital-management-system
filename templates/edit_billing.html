{% extends "base.html" %}
{% block content %}
<h3 class="text-center mt-2">Edit Bill</h3>
<form method="POST" class="mt-3">
    <div class="mb-2"><label>Patient</label>
        <select name="patient_id" class="form-control">
            {% for p in patients %}
            <option value="{{ p.id }}" {% if bill.patient_id == p.id %}selected{% endif %}>{{ p.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-2"><label>Description</label><input type="text" name="description" class="form-control" value="{{ bill.description }}" required></div>
    <div class="mb-2"><label>Amount</label><input type="number" step="0.01" name="amount" class="form-control" value="{{ bill.amount }}" required></div>
    <div class="mb-2"><label>Date</label><input type="date" name="date" class="form-control" value="{{ bill.date }}" required></div>
    <div class="mb-3"><label>Status</label>
        <select name="status" class="form-control">
            {% for s in ['Unpaid','Paid'] %}
            <option {% if bill.status == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-success">Update</button>
    <a href="{{ url_for('view_update_billing') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
