{% extends "base.html" %}
{% block content %}
<h3 class="text-center mt-2">Edit Medicine</h3>
<form method="POST" class="mt-3">
    <div class="mb-2"><label>Name</label><input type="text" name="name" class="form-control" value="{{ medicine.name }}" required></div>
    <div class="mb-2"><label>Quantity</label><input type="number" name="quantity" class="form-control" value="{{ medicine.quantity }}" required></div>
    <div class="mb-2"><label>Price</label><input type="number" step="0.01" name="price" class="form-control" value="{{ medicine.price }}" required></div>
    <div class="mb-2"><label>Expiry Date</label><input type="date" name="expiry_date" class="form-control" value="{{ medicine.expiry_date }}" required></div>
    <div class="mb-3"><label>Supplier</label><input type="text" name="supplier" class="form-control" value="{{ medicine.supplier }}" required></div>
    <button type="submit" class="btn btn-success">Update</button>
    <a href="{{ url_for('view_update_medicine') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
