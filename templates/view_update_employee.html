{% extends "base.html" %}
{% block content %}
<h3 class="text-center mt-2">Employees</h3>
<table class="table table-striped">
    <thead>
        <tr><th>ID</th><th>Name</th><th>Age</th><th>Phone</th><th>Role</th><th>Department</th><th>Salary</th><th>Actions</th></tr>
    </thead>
    <tbody>
        {% for emp in employees %}
        <tr>
            <td>{{ emp.id }}</td><td>{{ emp.name }}</td><td>{{ emp.age }}</td>
            <td>{{ emp.phone }}</td><td>{{ emp.role }}</td>
            <td>{{ emp.department }}</td><td>{{ emp.salary }}</td>
            <td>
                <a href="/edit_employee/{{ emp.id }}" class="btn btn-warning btn-sm">Edit</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
