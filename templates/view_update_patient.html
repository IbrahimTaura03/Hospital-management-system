{% extends "base.html" %}

{% block content %}
<h3 class="text-center">Edit Patient</h3>




<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for patient in patients %}
        <tr>
            <td>{{ patient.id }}</td>
            <td>{{ patient.name }}</td>
            <td>{{ patient.age }}</td>
            <td>{{ patient.phone }}</td>
            <td>{{ patient.address }}</td>
            <td>
                <a href="/edit_patient/{{ patient.id }}" class="btn btn-warning btn-sm">Edit</a>
            </td>

        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
