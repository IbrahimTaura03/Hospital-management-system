{% extends "base.html" %}
{% block content %}
<h3 class="text-center mt-2">Edit Task</h3>
<form method="POST" class="mt-3">
    <div class="mb-2"><label>Title</label><input type="text" name="title" class="form-control" value="{{ task.title }}" required></div>
    <div class="mb-2"><label>Description</label><textarea name="description" class="form-control" rows="3">{{ task.description }}</textarea></div>
    <div class="mb-2"><label>Assign To</label>
        <select name="assigned_to" class="form-control">
            {% for emp in employees %}
            <option value="{{ emp.id }}" {% if task.assigned_to == emp.id %}selected{% endif %}>{{ emp.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-2"><label>Due Date</label><input type="date" name="due_date" class="form-control" value="{{ task.due_date }}" required></div>
    <div class="mb-3"><label>Status</label>
        <select name="status" class="form-control">
            {% for s in ['Pending','In Progress','Done'] %}
            <option {% if task.status == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-success">Update</button>
    <a href="{{ url_for('task.view_update_task') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
