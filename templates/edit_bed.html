{% extends "base.html" %}
{% block content %}
<h3 class="text-center mt-2">Edit Bed</h3>
<form method="POST" class="mt-3">
    <div class="mb-2"><label>Bed Number</label><input type="text" name="bed_number" class="form-control" value="{{ bed.bed_number }}" required></div>
    <div class="mb-2"><label>Ward</label><input type="text" name="ward" class="form-control" value="{{ bed.ward }}" required></div>
    <div class="mb-2"><label>Status</label>
        <select name="status" class="form-control">
            {% for s in ['Available','Occupied'] %}
            <option {% if bed.status == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3"><label>Assigned Patient</label>
        <select name="patient_id" class="form-control">
            <option value="">-- None --</option>
            {% for p in patients %}
            <option value="{{ p.id }}" {% if bed.patient_id == p.id %}selected{% endif %}>{{ p.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-success">Update</button>
    <a href="{{ url_for('view_update_bed') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
