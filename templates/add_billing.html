{% extends "base.html" %}
{% block content %}
<div class="container-fluid mt-2 p-3 bg-secondary-subtle"><h1 class="text-center">Add Bill</h1></div>
<form method="POST" class="mt-3">
    <div class="mb-2"><label>Patient</label>
        <select name="patient_id" class="form-control" required>
            {% for p in patients %}
            <option value="{{ p.id }}">{{ p.name }} (ID: {{ p.id }})</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-2"><label>Description</label><input type="text" name="description" class="form-control" required></div>
    <div class="mb-2"><label>Amount</label><input type="number" step="0.01" name="amount" class="form-control" required></div>
    <div class="mb-2"><label>Date</label><input type="date" name="date" class="form-control" required></div>
    <div class="mb-3"><label>Status</label>
        <select name="status" class="form-control">
            <option>Unpaid</option><option>Paid</option>
        </select>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
</form>
{% endblock %}
