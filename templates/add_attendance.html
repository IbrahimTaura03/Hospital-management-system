{% extends "base.html" %}
{% block content %}
<div class="container-fluid mt-2 p-3 bg-secondary-subtle"><h1 class="text-center">Add Attendance</h1></div>
<form method="POST" class="mt-3">
    <div class="mb-2"><label>Employee</label>
        <select name="employee_id" class="form-control" required>
            {% for emp in employees %}
            <option value="{{ emp.id }}">{{ emp.name }} - {{ emp.role }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-2"><label>Date</label><input type="date" name="date" class="form-control" required></div>
    <div class="mb-3"><label>Status</label>
        <select name="status" class="form-control">
            <option>Present</option><option>Absent</option><option>Late</option>
        </select>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
</form>
{% endblock %}
